<script>
const state = { os: true, dep: true, lib: true, sw: true };

function toggleSection(key) {
  state[key] = !state[key];
  const desc = document.getElementById('desc-' + key);
  const tog = document.getElementById('tog-' + key);
  if (state[key]) {
    desc.style.display = '';
    desc.style.opacity = '1';
    tog.textContent = '▾';
  } else {
    desc.style.display = 'none';
    tog.textContent = '▸';
  }
  reflow();
}

function reflow() {
  const sections = [
    { key: 'os',  headerY: 50,  togY: 69 },
    { key: 'dep', headerY: null, togY: null },
    { key: 'lib', headerY: null, togY: null },
    { key: 'sw',  headerY: null, togY: null },
  ];

  const order = ['os', 'dep', 'lib', 'sw'];
  const descHeights = { os: 68, dep: 68, lib: 68, sw: 54 };
  const headerH = 46;
  const gap = 8;

  let y = 50;
  order.forEach((key, i) => {
    const secEl = document.getElementById('sec-' + key);
    const descEl = document.getElementById('desc-' + key);
    const togEl = document.getElementById('tog-' + key);

    const headerRect = secEl.querySelector('rect');
    const headerTitle = secEl.querySelector('text:first-of-type');
    const divEl = document.getElementById('div' + (i + 1));

    headerRect.setAttribute('y', y);
    const textY = y + 19;
    headerTitle.setAttribute('y', textY);
    togEl.setAttribute('y', textY);

    const descStartY = y + headerH;
    if (state[key] && descEl) {
      const texts = descEl.querySelectorAll('text');
      texts.forEach((t, ti) => {
        t.setAttribute('y', descStartY + ti * 16 + 2);
      });
      descEl.style.display = '';
      y = descStartY + descHeights[key];
    } else {
      y = y + headerH - 10;
    }

    if (divEl) {
      divEl.setAttribute('y1', y + gap);
      divEl.setAttribute('y2', y + gap);
      y = y + gap * 2 + 4;
    }
  });

  const svgH = Math.max(580, y + 40);
  document.getElementById('main-svg').setAttribute('viewBox', '0 0 680 ' + svgH);
}
</script>
