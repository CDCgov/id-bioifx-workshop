<div class="diag-nav">
  <button id="prev" onclick="navStep(-1)" disabled>◀</button>
  <span id="counter">System-wide (1 / 3)</span>
  <button id="next" onclick="navStep(1)">▶</button>

<script>
  let current = 0;
  const navSections = document.querySelectorAll('.nav-section');
  const labels = ['System-wide', 'User-specific', 'Virtual Environment'];

  function navStep(dir) {
    navSections[current].classList.remove('active');
    current = Math.max(0, Math.min(current + dir, navSections.length - 1));
    navSections[current].classList.add('active');
    document.getElementById('counter').textContent = `${labels[current]} (${current + 1} / ${navSections.length})`;
    document.getElementById('prev').disabled = current === 0;
    document.getElementById('next').disabled = current === navSections.length - 1;
  }

  function toggleSection(key) {
    const desc = document.getElementById('desc-' + key);
    const tog = document.getElementById('tog-' + key);
    const isOpen = desc.style.display !== 'none';
    desc.style.display = isOpen ? 'none' : '';
    tog.textContent = isOpen ? '▸' : '▾';
  }
</script>
